project:
  name: "LoreWeaver"
  stage: "M1.7"
  data_dir: "data"

sample:
  title: "黎明之剑"
  author: "远瞳"
  source_path: "data/raw/DawnSword_Chapter_1_260.txt"
  note: "M1 test source. M1.1 may restrict the first ingestion run to a smaller chapter range."

ingest:
  normalize_newlines: true
  remove_extra_blank_lines: true
  fallback_chapter_chars: 12000
  chapter_patterns:
    - "^第[一二三四五六七八九十百千万零〇两0-9]+章"
    - "^[一二三四五六七八九十百千万零〇两0-9]+章"
    - "^Chapter\\s+[0-9]+"
    - "^【 第 [0-9]+ 部分 】"

window:
  size_chars: 1200
  overlap_ratio: 0.2
  min_chars: 300
  max_chars: 1600

extraction:
  model: "Pro/deepseek-ai/DeepSeek-V3.2"
  temperature: 0
  max_retries: 2
  min_spans_per_window: 2
  max_spans_per_window: 12
  target_span_chars_min: 30
  target_span_chars_max: 800
  anchor_min_chars: 4
  anchor_max_chars: 80
  allow_overlap: true
  store_located_text: true
  store_uncovered_text: true
  input_yuan_per_1k: 0.002
  output_yuan_per_1k: 0.003

locator:
  fuzzy_threshold: 0.86
  search_scope: "window_first"

retrieval:
  graph_cluster_top_k: 4
  graph_span_per_cluster: 12
  vector_top_k: 30
  bm25_top_k: 30
  union_max_candidates: 80
  rerank_top_k: 15

graph:
  cluster_count: 4
  members_per_cluster: 8
  min_members_per_cluster: 5
  use_embeddings: true
  scoring_weights:
    vector: 0.4
    entity: 0.2
    topic: 0.15
    bm25: 0.1
    chapter: 0.1
    salience: 0.05

indexing:
  embedding_dimensions: 1024
  embedding_batch_size: 32
  embedding_input:
    include_key_quote: false
    include_located_text: false

evidence:
  pre_context_chars: 300
  post_context_chars: 500
  merge_gap_chars: 500
  max_evidence_chars: 40000
  max_blocks: 12

qa:
  model: "gpt-4o"
  temperature: 0
  require_citations: true
