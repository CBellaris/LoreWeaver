project:
  name: "LoreWeaver"
  stage: "M1"
  data_dir: "data"

sample:
  title: "黎明之剑"
  author: "远瞳"
  source_path: "data/raw/DawnSword_Chapter_1_260.txt"
  note: "M1 test source. M1.1 may restrict the first ingestion run to a smaller chapter range."

ingest:
  normalize_newlines: true
  remove_extra_blank_lines: true
  chapter_patterns:
    - "^第[一二三四五六七八九十百千万零〇两0-9]+章"
    - "^[一二三四五六七八九十百千万零〇两0-9]+章"
    - "^Chapter\\s+[0-9]+"
    - "^【 第 [0-9]+ 部分 】"

window:
  mode: "auto"
  size_chars: 1200
  overlap_ratio: 0.2
  min_chars: 300
  max_chars: 1600

extraction:
  max_retries: 2
  batch_live_retry_threshold: 3
  batch_retry_max_rounds: 3
  anchor_min_chars: 4
  anchor_max_chars: 80
  store_located_text: true
  store_uncovered_text: true

locator:
  fuzzy_threshold: 0.86
  search_scope: "window_first"

retrieval:
  graph_cluster_top_k: 4
  graph_span_per_cluster: 12
  vector_top_k: 30
  bm25_top_k: 30
  union_max_candidates: 80
  rerank_top_k: 15

eval:
  retrieval_profiles:
    broad:
      graph_cluster_top_k: 8
      graph_span_per_cluster: 20
      vector_top_k: 80
      bm25_top_k: 80
      union_max_candidates: 200
      rerank_top_k: 50
    mixed:
      graph_cluster_top_k: 8
      graph_span_per_cluster: 20
      vector_top_k: 80
      bm25_top_k: 80
      union_max_candidates: 200
      rerank_top_k: 50

graph:
  cluster_count: 4
  members_per_cluster: 8
  min_members_per_cluster: 5
  use_embeddings: true
  scoring_weights:
    vector: 0.4
    entity: 0.35
    bm25: 0.1
    chapter: 0.1
    salience: 0.05

indexing:
  embedding_dimensions: 1024
  embedding_batch_size: 32
  embedding_input:
    include_key_quote: false
    include_located_text: false

evidence:
  pre_context_chars: 200
  post_context_chars: 300
  merge_gap_chars: 500
  max_evidence_chars: 50000
  max_blocks: 16

qa:
  temperature: 0
  require_citations: true
