providers:
  openai:
    api_key_env: "OPENAI_API_KEY"
  siliconflow:
    api_key_env: "SILICONFLOW_API_KEY"
    base_url: "https://api.siliconflow.cn/v1"
  deepseek:
    api_key_env: "DEEPSEEK_API_KEY"
    base_url: "https://api.deepseek.com"

models:
  extraction:
    provider: "siliconflow"
    name: "Pro/deepseek-ai/DeepSeek-V3.2"
    batch_name: "deepseek-ai/DeepSeek-V3.1-Terminus"
    temperature: 0
    input_yuan_per_1k: 0.002
    output_yuan_per_1k: 0.003
    batch_input_yuan_per_1k: 0.002
    batch_output_yuan_per_1k: 0.006
    json_response_format: false
  qa:
    provider: "siliconflow"
    name: "Pro/deepseek-ai/DeepSeek-V3.2"
    temperature: 0
    input_yuan_per_1k: 0.002
    output_yuan_per_1k: 0.003
    json_response_format: false
  embedding:
    provider: "siliconflow"
    name: "Qwen/Qwen3-Embedding-0.6B"
    expected_dimensions: 1024
    batch_size: 32
    input_yuan_per_1k: 0
    use_dimensions_param: false
  reranker:
    provider: "siliconflow"
    name: "Qwen/Qwen3-Reranker-0.6B"
    fallback_name: "BAAI/bge-reranker-v2-m3"
    enabled: false
    timeout_seconds: 30
  eval_question_generator:
    provider: "deepseek"
    name: "deepseek-v4-pro"
    temperature: 0.2
    max_output_tokens: 384000
    json_response_format: false
